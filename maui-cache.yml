name: Download MAUI Cache

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install workload to cache
      run: |
        dotnet workload install android --version 10.0.20 --download-to-cache cache

    - name: Zip cache
      run: |
        powershell Compress-Archive -Path cache -DestinationPath cache.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: maui-cache
        path: cache.zip