name: Download MAUI Cache

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI Android workload
      run: |
        dotnet workload install maui-android --download-to-cache cache

    - name: Install iOS workload (optional)
      run: |
        dotnet workload install ios --download-to-cache cache

    - name: Zip cache
      run: |
        powershell Compress-Archive -Path cache -DestinationPath cache.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: maui-cache
        path: cache.zip